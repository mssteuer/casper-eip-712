name: publish-go-package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache: true
          cache-dependency-path: go/go.sum

      - name: Validate release ref
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          REF_NAME='${{ github.ref_name }}'
          if [[ ! "$REF_NAME" =~ ^rc-go-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "This workflow must be run from an rc-go-*.*.* ref. Got: $REF_NAME" >&2
            exit 1
          fi
          RELEASE_VERSION="${REF_NAME#rc-go-}"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Run tests
        working-directory: go
        run: |
          go test ./...
          go test -tags secp256k1 ./...

      - name: Create and push release tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="go/v${{ steps.validate.outputs.release_version }}"
          if git ls-remote --exit-code --tags origin "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG_NAME" >&2
            exit 1
          fi
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
